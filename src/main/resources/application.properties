spring.application.name=taup-hat-studio

# Server
server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true

# Thymeleaf
# Thymeleaf is used only for static site generation, not for serving the CMS UI.
# Disable the default template resolver so it does not interfere with the SPA.
spring.thymeleaf.check-template-location=false
spring.thymeleaf.enabled=false

# Security / OAuth2
# These will be overridden by environment variables or Cloud Foundry config.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Restrict login to these email addresses (comma-delimited)
tauphat.security.allowed-emails=${TAUPHAT_ALLOWED_EMAILS:}

# GCS
tauphat.gcs.bucket-name=${GCS_BUCKET_NAME:tauphat-assets}
tauphat.gcs.project-id=${GCS_PROJECT_ID:}

# Firebase Hosting
tauphat.firebase.site-id=${FIREBASE_SITE_ID:}

# Firebase web app config (public by design — used by the commissions form)
tauphat.firebase.api-key=${FIREBASE_API_KEY:}
tauphat.firebase.auth-domain=${FIREBASE_AUTH_DOMAIN:}
tauphat.firebase.project-id=${FIREBASE_PROJECT_ID:}
tauphat.firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:}
tauphat.firebase.messaging-sender-id=${FIREBASE_MESSAGING_SENDER_ID:}
tauphat.firebase.app-id=${FIREBASE_APP_ID:}
tauphat.firebase.recaptcha-site-key=${RECAPTCHA_SITE_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat connector limits – must accommodate the same size as the multipart config
# to prevent Tomcat from rejecting large uploads before Spring processes them.
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Backup
tauphat.backup.schedule=0 0 2 * * SUN
tauphat.backup.retention-count=3
