<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}">
  <title>Home</title>
</head>
<body class="page-fade-in">
  <div th:replace="~{fragments/layout :: stars}"></div>
  <header th:replace="~{fragments/layout :: header}"></header>

  <main class="site-main home-main">
    <!-- Hero section with rotating taglines -->
    <section class="hero-landing" data-aos="fade" data-aos-duration="1200">
      <div th:if="${config.heroImageUrl != null and !config.heroImageUrl.isEmpty()}" class="hero-landing-bg">
        <img th:src="${config.heroImageUrl}" alt="" class="hero-landing-bg-img">
      </div>
      <div class="hero-landing-content">
        <h1 class="hero-title" th:text="${siteName}">Site Name</h1>
        <div th:if="${taglines != null and !taglines.isEmpty()}" class="tagline-rotator">
          <span class="tagline" th:each="tagline, iter : ${taglines}"
                th:text="${tagline}"
                th:styleappend="'animation-delay: ' + ${iter.index * 3} + 's'"
                th:classappend="${iter.index == 0} ? ' tagline-active' : ''">Tagline</span>
        </div>
      </div>
    </section>

    <!-- Prominent nav buttons -->
    <section class="nav-buttons" data-aos="fade-up" data-aos-delay="200">
      <a href="/comics/" class="nav-btn">Comics</a>
      <a href="/portfolio/" class="nav-btn">Portfolio</a>
      <a href="/commissions/" class="nav-btn">Commissions</a>
      <a th:if="${config.bigcartelUrl != null and !config.bigcartelUrl.isEmpty()}"
         th:href="${config.bigcartelUrl}" target="_blank" rel="noopener" class="nav-btn">Shop</a>
    </section>

    <!-- About section (inline on home page) -->
    <section class="home-about" data-aos="fade-up">
      <div class="home-about-text">
        <h2>About</h2>
        <p th:if="${config.aboutText != null and !config.aboutText.isEmpty()}"
           th:text="${config.aboutText}">About the artist.</p>
        <p th:if="${config.aboutText == null or config.aboutText.isEmpty()}">
          More information coming soon.
        </p>
        <a href="/about/" class="btn btn-primary">Learn more &rarr;</a>
      </div>
      <div th:if="${!portfolioItems.isEmpty()}" class="home-about-image">
        <div class="about-carousel">
          <img th:each="item, iter : ${portfolioItems}"
               th:src="${item.optimizedUrl != null ? item.optimizedUrl : item.imageUrl}"
               th:alt="${item.title}"
               th:classappend="${iter.index == 0} ? ' active' : ''"
               class="about-carousel-img">
        </div>
      </div>
    </section>

    <!-- Portfolio / Projects preview (circular) -->
    <section th:if="${!portfolioItems.isEmpty()}" class="home-projects" data-aos="fade-up">
      <div class="section-header">
        <h2>Work</h2>
        <a href="/portfolio/">View all &rarr;</a>
      </div>
      <div class="project-circles">
        <a class="project-circle-item" href="/portfolio/" th:each="item, iter : ${portfolioItems}"
             data-aos="fade-up" th:attr="data-aos-delay=${iter.index * 120}">
          <span class="project-circle-title" th:text="${item.title}">Title</span>
          <div class="project-circle-img-wrap">
            <img th:src="${item.thumbnailUrl != null ? item.thumbnailUrl : item.imageUrl}"
                 th:alt="${item.title}">
          </div>
          <span th:if="${item.category != null}" class="project-circle-subtitle" th:text="${item.category}">Category</span>
        </a>
      </div>
    </section>

    <!-- Latest comic teaser -->
    <section th:if="${latestIssue != null}" class="home-latest-comic" data-aos="fade-up">
      <div class="section-header">
        <h2>Latest Comic</h2>
        <a href="/comics/">View all comics &rarr;</a>
      </div>
      <div class="card-grid">
        <a class="card" th:href="'/comics/' + ${latestIssueSeries.slug} + '/' + ${latestIssue.issueNumber} + '/'">
          <img th:if="${latestIssue.coverImageUrl != null}"
               th:src="${latestIssue.coverImageUrl}"
               th:alt="${latestIssue.title}"
               class="card-image">
          <div class="card-body">
            <h3 th:text="${latestIssueSeries.title}">Series</h3>
            <p th:text="${latestIssue.title}">Issue Title</p>
          </div>
        </a>
      </div>
    </section>
  </main>

  <footer th:replace="~{fragments/layout :: footer}"></footer>
  <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
